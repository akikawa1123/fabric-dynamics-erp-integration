      List candidate unshipped fulfillment orders for product CRCA.
      Do not treat product-level matches as confirmed lot impact.
    kql: |
      fn_candidate_affected_orders("CRCA")
  - question: Show historical return context for product CRCA.
    kql: |
      fn_product_return_context("CRCA")
