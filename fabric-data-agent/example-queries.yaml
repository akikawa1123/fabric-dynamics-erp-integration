      Investigate the anomaly for product CRCA, lot LOT-CRCA-20260625-001,
      station ST-07-PRESS, detected at 2026-06-25T01:32:15Z.
    kql: |
      fn_quality_anomaly_context(
        "CRCA",
        "LOT-CRCA-20260625-001",
        "ST-07-PRESS",
        datetime(2026-06-25T01:32:15Z),
        10m,
        20m
      )
